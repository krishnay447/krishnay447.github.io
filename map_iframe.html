<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; padding: 0; } #map { width: 100vw; height: 400px; }</style>
    <script src="https://apis.mappls.com/map_v3/map?layer=map&callback=initMap&key=sbtapoochnlzbfrgxtxnxuxfhvzouiidfutn" async defer></script>
</head>
<body>
    <div id="map"></div>
    <script>
        function initMap() {
            // Initialize map centered on your points
            var map = new mappls.Map('map', {
                center: [30, 40],
                zoom: 3
            });

            map.addListener('load', function() {
                var locs = [
                    [40.9650, -5.6629], // Salamanca
                    [31.2529, 34.7915], // Beer Sheva
                    [30.7046, 76.7179], // Mohali
                    [26.7606, 83.3732]  // Gorakhpur
                ];
                
                locs.forEach(c => {
                    new mappls.Marker({map: map, position: c}).addTo(map);
                });
            });
        }
    </script>
</body>
</html>
