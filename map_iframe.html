<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; padding: 0; }</style>
    <script src="https://apis.mappls.com/map_v3/map?layer=map&callback=initMap&key=sbtapoochnlzbfrgxtxnxuxfhvzouiidfutn" async defer></script>
</head>
<body>
    <div id="map" style="width: 100vw; height: 400px;"></div>
    <script>
        function initMap() {
            var map = new mappls.Map('map', { center: [30, 40], zoom: 3 });
            map.addListener('load', function() {
                var locs = [[40.9650,-5.6629], [31.2529,34.7915], [30.7046,76.7179], [26.7606,83.3732]];
                locs.forEach(c => { new mappls.Marker({map: map, position: c}); });
            });
        }
    </script>
</body>
</html>
